<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="darkmode.css">
    <script src="darkmode.js" defer></script>
<meta charset="UTF-8">
<title>Login Page</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    header {
        width: 100%;
        background-color: #E99331;
        text-align: center;
        padding: 20px 0;
        font-size: 24px;
        font-weight: bold;
    }

    .container {
        margin-top: 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    input {
        padding: 8px;
        width: 200px;
        font-size: 14px;
        margin-bottom: 5px;
    }

    label {
        font-weight: bold;
        margin-bottom: 10px;
    }

    .login-btn {
        margin-top: 20px;
        background-color: #675A5A;
        color: white;
        padding: 10px 25px;
        text-decoration: none;
        font-weight: bold;
        display: block;
        cursor: pointer;
        text-align: center;
    }

    .link {
        margin-top: 10px;
        margin-bottom: 20px;
        color: black;
        text-decoration: underline;
        font-style: italic;
        cursor: pointer;
    }

    .text {
        margin-top: 10px;
        margin-bottom: 0px;
    }

    .register {
        margin-top: -10px;
    }

    .login-form {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 10px;
    }
</style>

</head>

<body>

<header>
    Welcome to Dono!
</header>

<div class="container">

    <form onsubmit="login(event)" class="login-form">
        
        <label>Username:</label>
        <input type="text" name="username">

        <label>Password:</label>
        <input type="password" name="password">

        <!--Auth account and direct to homepage-->
        <button type="submit" class="login-btn">Login</button>

    </form>

    <br>

    <!--Direct to homepage-->    
    <a href="index.html" class="link">Continue as visitor</a>
    <br>

    <div class="text">Don't have an account?</div>

    <!--Direct to account creation page-->
    <a href="account_creation.html" class="link register">Register here!</a>
    <label>
  <input type="checkbox" id="dark-toggle"> Dark mode
</label>

</div>

<script>
async function login(event) {

    // Prevent page refresh
    event.preventDefault()

    const username = document.querySelector('input[name="username"]').value
    const password = document.querySelector('input[name="password"]').value

    const res = await fetch("http://localhost:8080/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
    })

    const data = await res.json()

    if (data.success) {
        localStorage.setItem('username', data.username || username);
        localStorage.setItem('role', data.role);
        localStorage.setItem('userCountry', data.country);

        if (data.role === "admin") {
            window.location.href = "admin_dashboard.html"
        } 
        else {
            window.location.href = "index.html"
        }

    } else {
        alert(data.message)
    }
}
</script>

</body>
</html>
