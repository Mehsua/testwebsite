<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="darkmode.css">
    <script src="darkmode.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <style>
        :root {
            --bg-container: #eeeeee;
            --color-primary: #333333;
            --border-gray: #cccccc;
        }

        body { font-family: sans-serif; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-container { width: 400px; background: var(--bg-container); padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border-radius: 8px; }
        
        .view { display: none; flex-direction: column; }
        .view.active { display: flex; }

        h2 { font-size: 1.1rem; text-align: center; margin-bottom: 20px; color: var(--color-primary); }
        
        .summary-box { background: #e0e0e0; padding: 15px; margin-bottom: 20px; border-radius: 4px; border-left: 4px solid #0056b3; }
        .summary-box strong { font-size: 0.75rem; color: #666; text-transform: uppercase; }
        .summary-val { display: block; font-size: 1.1rem; font-weight: bold; margin-top: 5px; }

        .form-group { margin-bottom: 15px; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }

        label { display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border-gray); border-radius: 4px; box-sizing: border-box; background: #fff; }
        
        .btn { width: 100%; padding: 15px; background: #333; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        .btn:hover { background: #444; }

        .spinner { width: 40px; height: 40px; border: 4px solid #ccc; border-top: 4px solid #0056b3; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">

    <!-- PAYMENT FORM VIEW -->
    <section id="view-payment" class="view active">
        <h2>DONATION DETAILS</h2>
        
        <div class="summary-box">
            <strong>Selected Campaign</strong>
            <span id="display-campaign" class="summary-val">Waiting for user input...</span>
            <hr style="border: 0; border-top: 1px solid #ccc; margin: 10px 0;">
            <strong>Amount</strong>
            <span id="display-amount" class="summary-val">$0.00</span>
        </div>

        <form id="donation-form">
            <input type="hidden" name="campaign_id" id="hidden-campaign-id">
            <input type="hidden" name="donation_amount" id="hidden-amount">

            <div class="form-group">
                <label>Cardholder Name</label>
                <input type="text" name="donor_name" placeholder="Name" required>
            </div>
            
            <div class="form-group">
                <label>Card Number</label>
                <input type="text" name="card_number" placeholder="0000 0000 0000 0000" required>
            </div>

            <!-- Added Expiry and CCV Row -->
            <div class="form-row">
                <div class="form-group">
                    <label>Expiry Date (MM/YY)</label>
                    <input type="text" name="expiry" placeholder="MM/YY" required>
                </div>
                <div class="form-group">
                    <label>CCV (3 digits)</label>
                    <input type="text" name="ccv" placeholder="123" required>
                </div>
            </div>

            <button type="submit" class="btn" id="submit-btn">DONATE NOW</button>
        </form>
    </section>

    <!-- LOADING VIEW -->
    <section id="view-processing" class="view">
        <div style="text-align: center; margin: 40px 0;">
            <div class="spinner"></div>
            <p>Securing your donation...</p>
        </div>
    </section>

    <!-- SUCCESS VIEW -->
    <section id="view-thankyou" class="view">
        <div style="text-align: center;">
            <div style="font-size: 3rem; margin-bottom: 10px;">❤️</div>
            <h2>THANK YOU!</h2>
            <p>Your contribution to <br><strong id="confirm-campaign"></strong> makes a difference.</p>
            <button class="btn" onclick="window.history.back()">RETURN TO CAMPAIGNS</button>
        </div>
    </section>
    <label style="display: block; text-align: center; margin-top: 16px; font-size: 13px;">
        <input type="checkbox" id="dark-toggle"> Dark mode
    </label>

</div>

<script>
    window.onload = function() {
        // 1. Fetching the campaign and amount via session storage
        const campaignName = sessionStorage.getItem('selectedCampaign') || params.get('campaign');
        const amount = sessionStorage.getItem('selectedAmount') || params.get('amount');
        
        // 2. Clear it immediately so it doesn't persist on next reload
        sessionStorage.removeItem('selectedCampaign');
        sessionStorage.removeItem('selectedAmount');

        // 3. If either is missing, redirect
        if (!campaignName || !amount) {
            alert("No campaign selected. Redirecting you to the main page...");
            window.location.href = 'Payment.html'; 
            return; 
        }

        // 4. Convert the string to a number for the UI
        const amountNum = parseFloat(amount);

        // 5. Final check for valid/positive number
        if (isNaN(amountNum) || amountNum <= 0) {
            alert("Invalid amount detected. Redirecting...");
            window.location.href = 'Payment.html';
            return;
        }


        // 2. Update UI
        document.getElementById('display-campaign').innerText = campaignName;
        document.getElementById('display-amount').innerText = `$${parseFloat(amount).toFixed(2)}`;
        document.getElementById('confirm-campaign').innerText = campaignName;
        document.getElementById('submit-btn').innerText = `DONATE $${parseFloat(amount).toFixed(2)} NOW`;

        // 3. Populate Hidden Fields for Backend
        document.getElementById('hidden-campaign-id').value = campaignName;
        document.getElementById('hidden-amount').value = amount;
    };

    window.addEventListener('beforeunload', (e) => {
        // Warn them if they haven't finished the donation
        // Check if the 'thankyou' view is NOT active
        const thankYouView = document.getElementById('view-thankyou');
        if (thankYouView && !thankYouView.classList.contains('active')) {
            e.preventDefault();
            e.returnValue = ''; // Trigger the browser's generic alert
        }
    });

    const form = document.getElementById('donation-form');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Grabbing all values for validation
        const name = document.getElementsByName('donor_name')[0].value;
        const cardNumber = document.getElementsByName('card_number')[0].value;
        const expiry = document.getElementsByName('expiry')[0].value;
        const ccv = document.getElementsByName('ccv')[0].value;

        try {
            // 1. Validate Name (Check if it's at least 2 characters and not just numbers)
            const namePattern = /^[a-zA-Z\s\-]+$/;
            if (!name.trim()) {
                throw new Error("Cardholder Name cannot be empty.");
            }          

            if (!namePattern.test(name)) {
                throw new Error("Invalid Name. Names should not contain numbers or special characters.");
            }

            // 2. Validate Card Number (16 digits)
            // We remove spaces in case the user typed "1234 5678..."
            const cleanCard = cardNumber.replace(/\s+/g, '');
            if (cleanCard.length !== 16 || isNaN(cleanCard)) {
                throw new Error("Invalid Card Number. Please enter 16 digits.");
            }

            // 3. Validate Expiry Date (MM/YY format)
            // This Regex checks for 2 digits, a slash, and 2 digits
            const datePattern = /^(0[1-9]|1[0-2])\/?([0-9]{2})$/;
            if (!datePattern.test(expiry)) {
                throw new Error("Invalid Expiry Date. Please use MM/YY format (e.g., 12/28).");
            }

            // 4. Validate CCV (3 digits)
            if (isNaN(ccv) || ccv.length !== 3) {
                throw new Error("Invalid CCV. Please enter the 3-digit code on the back of your card.");
            }
            // If all checks pass, proceed to processing
            switchView('processing');

            // Simulate the 2-second bank authorization
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            switchView('thankyou');

        } catch (error) {
            // Catches any of the "throws" above and alerts the user
            alert(error.message);
        }
    });

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
    }
</script>

</body>
</html>
