<style>
  .page { max-width: 580px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .header { text-align: center; margin-bottom: 2rem; }
  h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 0.3rem; }
  .subtitle { font-size: 15px; color: var(--color-text-secondary); }
  .field { margin-bottom: 1.25rem; }
  label { display: block; font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }
  label .hint { font-weight: 400; color: var(--color-text-secondary); font-size: 13px; }
  input[type="text"], input[type="email"], input[type="number"], textarea, select { width: 100%; }
  textarea { resize: vertical; min-height: 110px; }
  .currency-wrap { position: relative; }
  .currency-wrap span { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--color-text-secondary); font-size: 15px; pointer-events: none; }
  .currency-wrap input { padding-left: 28px !important; }
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 1.75rem 0; }
  .section-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1.1rem; }
  .btn-submit { width: 100%; height: 46px; background: #3B6D11; border: none; border-radius: var(--border-radius-md); cursor: pointer; font-size: 15px; font-weight: 500; color: #EAF3DE; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.15s; margin-top: 1.75rem; }
  .btn-submit:hover { background: #27500A; }
  .btn-submit:active { transform: scale(0.98); }

  /* Image upload */
  .upload-zone {
    border: 1.5px dashed var(--color-border-secondary, #d0d0d0);
    border-radius: var(--border-radius-md, 8px);
    padding: 1.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    background: transparent;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: #3B6D11;
    background: rgba(59, 109, 17, 0.04);
  }
  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .upload-icon { font-size: 24px; color: var(--color-text-secondary); margin-bottom: 0.4rem; }
  .upload-text { font-size: 14px; color: var(--color-text-secondary); }
  .upload-text strong { color: var(--color-text-primary); font-weight: 500; }
  .upload-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; opacity: 0.7; }

  /* Preview state */
  .upload-preview {
    display: none;
    position: relative;
    border-radius: var(--border-radius-md, 8px);
    overflow: hidden;
    background: var(--color-background-secondary);
  }
  .upload-preview img {
    width: 100%;
    max-height: 220px;
    object-fit: cover;
    display: block;
  }
  .preview-remove {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(0,0,0,0.55);
    border: none;
    cursor: pointer;
    color: #fff;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .preview-remove:hover { background: rgba(0,0,0,0.8); }
  .preview-filename {
    font-size: 12px;
    color: var(--color-text-secondary);
    padding: 6px 10px;
    background: var(--color-background-secondary);
  }

  .success { text-align: center; padding: 2.5rem 1rem; }
  .success h2 { font-size: 20px; font-weight: 500; margin-bottom: 0.4rem; color: var(--color-text-primary); }
  .success p { color: var(--color-text-secondary); font-size: 15px; margin-bottom: 1.5rem; }

  .summary { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem 1.25rem; text-align: left; margin-bottom: 1.5rem; }
  .summary-row { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; }
  .summary-row span:first-child { color: var(--color-text-secondary); }
  .summary-row span:last-child { font-weight: 500; color: var(--color-text-primary); max-width: 60%; text-align: right; }

  /* Campaign photo in summary */
  .summary-photo { width: 100%; border-radius: calc(var(--border-radius-md, 8px) - 2px); max-height: 160px; object-fit: cover; display: block; margin-bottom: 0.75rem; }

  /* Captcha */
  .captcha-wrap { display: flex; align-items: center; gap: 16px; }
  .captcha-ascii { font-family: monospace; font-size: 13px; line-height: 1.35; background: var(--color-background-secondary); padding: 12px 16px; border-radius: var(--border-radius-md, 8px); color: var(--color-text-primary); white-space: pre; letter-spacing: 0.05em; user-select: none; }
  .captcha-right { display: flex; flex-direction: column; gap: 6px; }
  .captcha-prompt { font-size: 13px; color: var(--color-text-secondary); }
  .captcha-wrap input { width: 80px; }
  .captcha-error { font-size: 12px; color: #c0392b; margin-top: 5px; display: none; }

  .hidden { display: none; }
  .btn-share { width: 100%; height: 42px; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; font-size: 14px; color: var(--color-text-primary); display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
  .btn-share:hover { background: var(--color-background-secondary); }
</style>

<div class="page">
  <div class="header">
    <div class="icon-wrap"><i class="ti ti-heart" aria-hidden="true"></i></div>
    <h1>Start a campaign</h1>
  </div>

  <div id="form-view">
    <div class="section-title">About your campaign</div>

    <div class="field">
      <label>Campaign title</label>
      <input type="text" id="title" placeholder="e.g. Help us build a school library" />
    </div>

    <div class="field">
      <label>Fundraising goal ($)</label>
      <div class="currency-wrap">
        <span>$</span>
        <input type="number" id="goal" placeholder="500" min="1" />
      </div>
    </div>

    <div class="field">
      <label>Description <span class="hint">— tell people why you're raising funds</span></label>
      <textarea id="story" placeholder="Explain who will benefit and how the money will be used..."></textarea>
    </div>

    <div class="field">
      <label>Campaign photo <span class="hint">— optional, helps people connect with your cause</span></label>

      <div class="upload-zone" id="upload-zone">
        <input type="file" id="photo-input" accept="image/*" onchange="handlePhoto(this)" />
        <div class="upload-icon"><i class="ti ti-photo" aria-hidden="true"></i></div>
        <div class="upload-text"><strong>Click to upload</strong> or drag and drop</div>
        <div class="upload-sub">JPG, PNG, GIF up to 10 MB</div>
      </div>

      <div class="upload-preview" id="upload-preview">
        <img id="preview-img" src="" alt="Campaign photo preview" />
        <button class="preview-remove" onclick="removePhoto()" title="Remove photo">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
        <div class="preview-filename" id="preview-filename"></div>
      </div>
    </div>

    <div class="field">
      <label>Verify you're human <span class="hint">— type the number you see below</span></label>
      <div class="captcha-wrap">
        <div class="captcha-ascii" id="captcha-ascii"></div>
        <div class="captcha-right">
          <span class="captcha-prompt">What number is this?</span>
          <input type="number" id="captcha-answer" placeholder="?" min="0" max="9" />
        </div>
      </div>
      <div class="captcha-error" id="captcha-error">Incorrect — please look again.</div>
    </div>

    <button class="btn-submit" onclick="launch()">
      <i class="ti ti-rocket" aria-hidden="true"></i> Launch my campaign
    </button>
  </div>

  <div id="success-view" class="hidden">
    <div class="success">
      <div class="big-icon"><i class="ti ti-check" aria-hidden="true"></i></div>
      <h2>Your campaign is live!</h2>
      <div class="summary">
        <img id="s-photo" class="summary-photo hidden" src="" alt="Campaign photo" />
        <div class="summary-row"><span>Title</span><span id="s-title">—</span></div>
        <div class="summary-row"><span>Goal</span><span id="s-goal">—</span></div>
      </div>
    </div>
  </div>
</div>

<script>
  let photoDataUrl = null;
  let captchaAnswer = 0;

  const ASCII_DIGITS = [
    // 0
    " _ \n| |\n|_|",
    // 1
    "   \n  |\n  |",
    // 2
    " _ \n _|\n|_ ",
    // 3
    " _ \n _|\n _|",
    // 4
    "   \n|_|\n  |",
    // 5
    " _ \n|_ \n _|",
    // 6
    " _ \n|_ \n|_|",
    // 7
    " _ \n  |\n  |",
    // 8
    " _ \n|_|\n|_|",
    // 9
    " _ \n|_|\n _|",
  ];

  function generateCaptcha() {
    captchaAnswer = Math.floor(Math.random() * 10);
    document.getElementById('captcha-ascii').textContent = ASCII_DIGITS[captchaAnswer];
    document.getElementById('captcha-answer').value = '';
    document.getElementById('captcha-error').style.display = 'none';
  }
  generateCaptcha();

  // Drag-and-drop support
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadPhoto(file);
  });

  function handlePhoto(input) {
    if (input.files && input.files[0]) loadPhoto(input.files[0]);
  }

  function loadPhoto(file) {
    const reader = new FileReader();
    reader.onload = e => {
      photoDataUrl = e.target.result;
      document.getElementById('preview-img').src = photoDataUrl;
      document.getElementById('preview-filename').textContent = file.name;
      document.getElementById('upload-zone').style.display = 'none';
      document.getElementById('upload-preview').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  function removePhoto() {
    photoDataUrl = null;
    document.getElementById('photo-input').value = '';
    document.getElementById('preview-img').src = '';
    document.getElementById('upload-preview').style.display = 'none';
    document.getElementById('upload-zone').style.display = 'block';
  }

  function launch() {
    const title = document.getElementById('title').value.trim();
    const goal = document.getElementById('goal').value;
    const userAnswer = parseInt(document.getElementById('captcha-answer').value, 10);
    if (!title || !goal) {
      alert('Please fill in your campaign title and goal.');
      return;
    }
    if (isNaN(userAnswer) || userAnswer !== captchaAnswer) {
      document.getElementById('captcha-error').style.display = 'block';
      generateCaptcha();
      return;
    }
    document.getElementById('s-title').textContent = title;
    document.getElementById('s-goal').textContent = '$' + Number(goal).toLocaleString();

    // Show photo in summary if uploaded
    const sPhoto = document.getElementById('s-photo');
    if (photoDataUrl) {
      sPhoto.src = photoDataUrl;
      sPhoto.classList.remove('hidden');
    } else {
      sPhoto.classList.add('hidden');
    }

    document.getElementById('form-view').classList.add('hidden');
    document.getElementById('success-view').classList.remove('hidden');
  }
</script>
